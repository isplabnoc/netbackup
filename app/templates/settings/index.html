{% extends "base.html" %}
{% block content %}
<form class="panel" method="post" action="/settings">
  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
  <div class="row g-4">
    <div class="col-12 col-xl-4">
      <h2 class="h6 mb-3">Agendamento</h2>
      <div class="form-check form-switch mb-3">
        <input class="form-check-input" type="checkbox" name="scheduler_enabled" id="scheduler_enabled" {% if scheduler.enabled %}checked{% endif %}>
        <label class="form-check-label" for="scheduler_enabled">Backup diário ativo</label>
      </div>
      <label class="form-label">Hora</label>
      <input class="form-control mb-2" name="scheduler_hour" type="number" min="0" max="23" value="{{ scheduler.hour }}" required>
      <label class="form-label">Minuto</label>
      <input class="form-control mb-3" name="scheduler_minute" type="number" min="0" max="59" value="{{ scheduler.minute }}" required>
    </div>
    <div class="col-12 col-xl-4">
      <h2 class="h6 mb-3">Telegram</h2>
      <input class="form-control mb-2" name="telegram_bot_token" type="password" placeholder="Bot token" value="{{ notifications.telegram_bot_token or '' }}">
      <input class="form-control mb-3" name="telegram_chat_id" placeholder="Chat ID" value="{{ notifications.telegram_chat_id or '' }}">
    </div>
    <div class="col-12 col-xl-4">
      <h2 class="h6 mb-3">Evolution API</h2>
      <input class="form-control mb-2" name="evolution_api_url" placeholder="URL" value="{{ notifications.evolution_api_url or '' }}">
      <input class="form-control mb-2" name="evolution_api_token" type="password" placeholder="API token" value="{{ notifications.evolution_api_token or '' }}">
      <input class="form-control mb-3" name="evolution_api_instance" placeholder="Instância" value="{{ notifications.evolution_api_instance or '' }}">
    </div>
  </div>
  <button class="btn btn-primary" type="submit">Salvar configurações</button>
</form>
{% endblock %}
