services:
  app:
    build: .
    env_file:
      - .env
    depends_on:
      - postgres
    volumes:
      - ./backups:/app/backups
      - ./logs:/app/logs
    expose:
      - "8000"
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: netaudit
      POSTGRES_USER: netaudit
      POSTGRES_PASSWORD: netaudit
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/static:/usr/share/nginx/html/static:ro

volumes:
  postgres_data:
